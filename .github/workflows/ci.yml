name: CI/CD

on:
  push:
  pull_request:

env:
  PROJECT_ID: personal-enterprise-493003
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/personal-enterprise-493003/personal-enterprise/go-auth
  WIF_PROVIDER: projects/213672305641/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider
  SERVICE_ACCOUNT: personal-enterprise-run@personal-enterprise-493003.iam.gserviceaccount.com
  CLOUD_SQL_INSTANCE: personal-enterprise-493003:us-central1:personal-enterprise

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...

      - run: go vet ./...

      - run: go test ./...

  deploy-dev:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy go-auth-dev \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-secrets DATABASE_URL=db-url-auth:latest,JWT_PUBLIC_KEY=jwt-public-key:latest,JWT_PRIVATE_KEY=jwt-private-key:latest,REFRESH_TOKEN_PEPPER=refresh-token-pepper:latest,TRACER_SERVICE_KEY=tracer-service-key:latest \
            --set-env-vars ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},TRACER_SERVICE_URL=${{ vars.TRACER_SERVICE_URL }},PUBSUB_PROJECT_ID=${{ vars.PUBSUB_PROJECT_ID }},RUBE_OWID_NEXT_URL=${{ vars.RUBE_OWID_NEXT_URL }} \
            --allow-unauthenticated

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy go-auth \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --max-instances 2 \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --set-secrets DATABASE_URL=db-url-auth:latest,JWT_PUBLIC_KEY=jwt-public-key:latest,JWT_PRIVATE_KEY=jwt-private-key:latest,REFRESH_TOKEN_PEPPER=refresh-token-pepper:latest,TRACER_SERVICE_KEY=tracer-service-key:latest \
            --set-env-vars ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},TRACER_SERVICE_URL=${{ vars.TRACER_SERVICE_URL }},PUBSUB_PROJECT_ID=${{ vars.PUBSUB_PROJECT_ID }},RUBE_OWID_NEXT_URL=${{ vars.RUBE_OWID_NEXT_URL }},DB_NAME=${{ vars.DB_NAME }},PUBSUB_TOPIC_DEMO_REGISTERED=${{ vars.PUBSUB_TOPIC_DEMO_REGISTERED }} \
            --allow-unauthenticated
